    <main class="quiz-content">
      <header class="quiz-header">
        <h1>
          <span class="quiz-title-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 3H15V6H19C20.1 6 21 6.9 21 8V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V8C3 6.9 3.9 6 5 6H9V3Z"></path>
              <path d="M9 11H15"></path>
              <path d="M9 15H13"></path>
            </svg>
          </span>
          Health Assessment Quiz
        </h1>
        <p>Answer these questions to assess your overall health risk</p>
      </header>

      <section id="quizCard" class="quiz-card">
        <div class="quiz-progress-row">
          <span id="quizProgressLabel">Question 1 of 8</span>
          <div class="progress-track">
            <div id="quizProgressFill" class="progress-fill"></div>
          </div>
        </div>

        <h2 id="quizQuestionText" class="quiz-question"></h2>

        <div id="quizOptions" class="quiz-options"></div>
      </section>

      <section id="quizResultCard" class="quiz-result-card hidden">
        <div id="quizResultIcon" class="result-icon"></div>
        <h2 id="quizResultTitle"></h2>
        <p id="quizResultSummary" class="result-summary"></p>
        <p id="quizResultScore" class="result-score"></p>

        <div class="result-progress">
          <div id="quizResultProgressFill" class="result-progress-fill"></div>
        </div>

        <div class="result-highlights">
          <h3>Focus Areas</h3>
          <div id="quizResultHighlights" class="highlight-list"></div>
        </div>

        <button id="retakeQuizButton" class="retake-button" type="button">Retake Quiz</button>
      </section>
